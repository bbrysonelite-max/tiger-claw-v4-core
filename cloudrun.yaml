apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tiger-claw-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
        - image: gcr.io/${GCP_PROJECT_ID}/tiger-claw-api:latest
          ports:
            - containerPort: 4000
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
          # Secrets injected via Secret Manager — set these up in GCP Console:
          # DATABASE_URL, REDIS_URL, GOOGLE_API_KEY, STRIPE_SECRET_KEY,
          # STRIPE_WEBHOOK_SECRET, ADMIN_TOKEN, ADMIN_TELEGRAM_BOT_TOKEN,
          # TIGER_CLAW_HIVE_TOKEN, PLATFORM_ONBOARDING_KEY,
          # PLATFORM_EMERGENCY_KEY, ENCRYPTION_KEY, SERPER_KEY_1,
          # SERPER_KEY_2, SERPER_KEY_3, TIGER_CLAW_API_URL
