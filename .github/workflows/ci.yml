name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'api/package-lock.json'
        
    - name: Clean Install Dependencies
      working-directory: ./api
      run: npm ci
      
    - name: Type Check (TSC)
      working-directory: ./api
      run: npx tsc --noEmit
      
    - name: Run Tests
      working-directory: ./api
      run: npm test
